<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#g1)"/>
  <!-- Flowing F shape built from curves -->
  <path d="
    M 160 400
    L 160 200
    Q 160 120, 240 120
    L 360 120
    M 160 240
    Q 160 240, 200 240
    L 300 240
    Q 340 240, 340 220
  " fill="none" stroke="white" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flow wave at bottom of F stem -->
  <path d="
    M 160 400
    Q 200 400, 220 380
    Q 240 360, 280 360
    Q 320 360, 340 380
  " fill="none" stroke="white" stroke-width="36" stroke-linecap="round" opacity="0.85"/>
</svg>