<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#g3)"/>
  <!-- Three stacked content cards with flow curves -->
  <!-- Back card -->
  <rect x="160" y="100" width="240" height="160" rx="20" fill="white" opacity="0.25"/>
  <!-- Middle card -->
  <rect x="136" y="140" width="240" height="160" rx="20" fill="white" opacity="0.45"/>
  <!-- Front card -->
  <rect x="112" y="180" width="240" height="160" rx="20" fill="white" opacity="0.9"/>
  <!-- Play/post triangle on front card -->
  <path d="M 200 235 L 200 285 L 240 260 Z" fill="url(#g3)"/>
  <!-- Flow wave underneath all cards -->
  <path d="
    M 100 390
    Q 160 350, 220 370
    Q 280 390, 340 360
    Q 400 330, 420 360
  " fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.8"/>
</svg>