      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Icon: stylized FP monogram with flow -->
  <circle cx="80" cy="100" r="72" fill="url(#g4)"/>
  <!-- F inside circle -->
